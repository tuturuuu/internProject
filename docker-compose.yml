services:
  backend-api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4.1}
    volumes:
      - .:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: ./fe/my-react-app
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    volumes:
      - ./fe/my-react-app:/app
      - /app/node_modules
    env_file:
      - ./fe/my-react-app/.env
    environment:
      CHOKIDAR_USEPOLLING: "true"
    depends_on:
      - backend-api
    command: ["npm", "run", "dev", "--", "--host", "0.0.0.0"]
